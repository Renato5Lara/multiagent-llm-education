version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: upao_postgres
    environment:
      POSTGRES_USER: upao_user
      POSTGRES_PASSWORD: upao_pass
      POSTGRES_DB: upao_mas_edu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upao_user -d upao_mas_edu"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upao_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
