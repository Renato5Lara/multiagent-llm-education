version: "3.9"

# ============================================================
# UPAO-MAS-EDU — Production Docker Compose
# ============================================================
# Usage:
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: upao_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-upao_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-upao_pass_prod}
      POSTGRES_DB: ${POSTGRES_DB:-upao_mas_edu}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-upao_user} -d ${POSTGRES_DB:-upao_mas_edu}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - upao_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upao_backend_prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - ENV=production
      - DEBUG=False
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    command: >
      sh -c "
        alembic upgrade head &&
        python seed.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - upao_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local

networks:
  upao_network:
    driver: bridge
